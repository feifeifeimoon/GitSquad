version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/server/store/queries"
    schema: "internal/server/store/schema.sql"
    gen:
      go:
        package: "db"
        out: "internal/server/store/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "NullUUID"
